<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第五次作业</title>
    <style>
        * {
            margin: 0px;
            padding: 0px;
        }

        p {
            font-size: 53px;
            font-family: "楷体", "楷体_GB2312", bolder;
        }

        img {
            height: 88px;
        }

        div {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;

            width: 470px;

            left: -382px;

            transition: all .75s;
        }

        div:hover {
            left: 0px;
        }
    </style>
</head>
<body>
    <div style="background: red;">
        <p>&nbsp;游客 Vistor&nbsp;</p>
        <img src="images/vistor.svg">
    </div>

    <div style="background: aqua;">
        <p>&nbsp;学生 Student&nbsp;</p>
        <img src="images/student.svg">
    </div>
</body>
</html>
