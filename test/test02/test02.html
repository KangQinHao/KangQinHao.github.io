<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>CSS照片墙</title>
		<style>
		html {
            height: 100%;
			background-color: #78A496;
		}

        h1 {
            font-family: 宋体;
        }
		
        img {
			margin: 15px;
			border-color: white;
			border-style: solid;
			width:250px;
			height:150px;
		}

		img:hover{box-shadow: 0px 15px 30px #000;}

		.above01 {
			position: absolute;
			left: 240px;
			top: 200px;
		}

		.above02 {
			position: absolute;
			left: 800px;
			top: 350px;
		}

		.above03 {
			position: absolute;
			left: 1100px;
			top: 150px;
		}
	</style>
	</head>
	<body>
		<center>
			<div>
				<h1>CSS照片墙</h1>
				<img src="images/image01.jpg">
				<img src="images/image02.jpg">
				<img src="images/image03.jpg">
				<img src="images/image04.jpg">
				<img src="images/image05.jpg">
				<img src="images/image06.jpg">
				<img src="images/image07.jpg">
				<img src="images/image08.jpg">
				<img src="images/image09.jpg">
				<img src="images/image10.jpg">
				<img src="images/image11.jpg">
				<img src="images/image12.jpg">
				<img src="images/image13.jpg">
				<img src="images/image14.jpg">
				<img src="images/image15.jpg">
				<img class="above01" src="images/image16.jpg">
				<img class="above02" src="images/image17.jpg">
				<img class="above03" src="images/image18.jpg">
			</div>
		</center>
	</body>
</html>
