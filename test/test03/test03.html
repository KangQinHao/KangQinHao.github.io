<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>跑动的汽车</title>
	<style>
        html {
            margin: 0px;
            padding: 0px;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        div {
            display: flex;
            justify-content: center;
            align-items: center;
            border: 8px solid black;
            border-radius: 50px;
            background: #ddd;
        }
            
        .container1 {
            width: 1200px;
            height: 600px;
        }

        .container2 {
            border: 10px dashed black;
            width: 1064px;
            height: 464px;
        }

        .container3 {
            width: 928px;
            height: 328px;
        }

        img {
            position: relative;
            left: -535px;
            top: -235px;
            width: 136px;
            height: 136px;
            animation: runningCar 10s linear infinite;
            -webkit-animation: runningCar 10s linear infinite;
            z-index:1
        }

        img:hover {
            animation-play-state: paused;
        }

        @keyframes runningCar {
            0% {left: -535px; top: -235px;}
            25% {left: 535px; top: -235px;}
            50% {left: 535px; top: 235px;}
            75% {left: -535px; top: 235px;}
            100% {left: -535px; top: -235px;}
        }

        @-webkit-keyframes runningCar {
            0% {left: -535px; top: -235px;}
            25% {left: 535px; top: -235px;}
            50% {left: 535px; top: 235px;}
            75% {left: -535px; top: 235px;}
            100% {left: -535px; top: -235px;}
        }
	</style>
</head>
<body>
	<div class="container1">
		<div class="container2">
		    <div class="container3">
                <img src="images/car.png"/>
            </div>
	    </div>
	</div>	
</body>
</html>
