<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="shortcut icon" href="images/siamese.ico" />
        <link rel="stylesheet" href="usagi.css" />
        <script>
            if (history.scrollRestoration) {
                history.scrollRestoration = 'manual';
            }

            document.onreadystatechange = function () {
                if (document.readyState == "complete") {    
                    document.querySelector(".loading").style.display = 'none';
                    document.body.style.overflow = 'scroll';
                }
            }
        </script>
        <title>兎</title>
    </head>
    <body>
        <div class="loading">Loading...</div>
        <div class="container" tg-name="scroll" tg-from="0" tg-to="120" tg-step="0.2" tg-edge="inset" tg-ref="tgs" >
            <div class="sticky">
                <span>WELCOME</span>
                <span>LUCKY IS COMING</span>
                <span style="font-family: 'KaiTi', Helvetica;">兎</span>
                <span style="color: rgba(250, 128, 114, 0.5)">USAGI.COOL</span>
            </div>
        </div>
        <div class="footer">
            <a href="https://beian.miit.gov.cn/" target="_black">备案号</a>
        </div>
    </body>
    <script type="text/javascript" src="https://unpkg.com/@triggerjs/trigger"></script>
</html>
